site_name: "AI Skills, German Law"
site_url: https://borghei.github.io/AI-Skills-German-Law
site_description: >-
  Tested AI skills for German legal practice and EU compliance. 23 areas
  (11 substantive German law areas + 5 Fachanwaltschaften + 7 EU compliance
  frameworks). 28 skills, all passing structural eval. Provider-agnostic
  core with adapters for Claude, Gemini, and GPT. Researcher then drafter
  then reviewer sub-agents. Primary-source citations linked to
  gesetze-im-internet.de and EUR-Lex. Dated verification log.
site_author: Borghei
repo_url: https://github.com/borghei/AI-Skills-German-Law
repo_name: borghei/AI-Skills-German-Law
edit_uri: edit/main/docs/
copyright: "Copyright 2026 Borghei. Apache-2.0 OR MIT."

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/scale-balance
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search:
      separator: '[\s\-\.]+'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/borghei/AI-Skills-German-Law
    - icon: fontawesome/solid/globe
      link: https://borghei.me
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list
  - footnotes

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Providers: getting-started/providers.md
  - Areas:
    - areas/index.md
    - German legal practice: areas/german-law.md
    - Fachanwaltschaften: areas/fachanwaltschaften.md
    - EU compliance: areas/eu-compliance.md
  - Trust:
    - Verification: verification.md
    - Compliance: compliance.md
    - Methodology: methodology.md
  - Contributing: contributing.md
