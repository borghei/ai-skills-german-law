<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="AI Skills · German Law">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="50%" stop-color="#10182B"/>
      <stop offset="100%" stop-color="#161F36"/>
    </linearGradient>
    <linearGradient id="goldRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A24C" stop-opacity="0"/>
      <stop offset="20%" stop-color="#D4A24C" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#D4A24C" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D4A24C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="paragraphGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#D4A24C" stop-opacity="0.20"/>
      <stop offset="70%" stop-color="#D4A24C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#dots)"/>

  <!-- Watermark § on right -->
  <text x="1140" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="320" font-weight="400" fill="#D4A24C" fill-opacity="0.06" text-anchor="end">§</text>

  <!-- Hero § -->
  <circle cx="155" cy="150" r="120" fill="url(#paragraphGlow)"/>
  <text x="155" y="205" font-family="Georgia, 'Times New Roman', serif" font-size="200" font-weight="400" fill="#D4A24C" text-anchor="middle">§</text>

  <!-- Vertical separator -->
  <line x1="280" y1="70" x2="280" y2="230" stroke="#D4A24C" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="320" y="98" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#D4A24C" letter-spacing="2.5">OPEN SOURCE · MULTI-PROVIDER</text>

  <!-- Title -->
  <text x="320" y="155" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">AI SKILLS · GERMAN LAW</text>

  <!-- Subtitle -->
  <text x="320" y="188" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="400" fill="#9AA3B8" letter-spacing="0.3">Production-grade AI skills for the German legal practice.</text>

  <!-- Provider chips -->
  <g transform="translate(320, 215)">
    <g>
      <rect x="0" y="0" width="105" height="34" rx="17" fill="none" stroke="#D4A24C" stroke-width="1.3" stroke-opacity="0.75"/>
      <text x="52.5" y="22" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.4">CLAUDE</text>
    </g>
    <g transform="translate(115, 0)">
      <rect x="0" y="0" width="105" height="34" rx="17" fill="none" stroke="#D4A24C" stroke-width="1.3" stroke-opacity="0.75"/>
      <text x="52.5" y="22" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.4">GEMINI</text>
    </g>
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="105" height="34" rx="17" fill="none" stroke="#D4A24C" stroke-width="1.3" stroke-opacity="0.75"/>
      <text x="52.5" y="22" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.4">GPT</text>
    </g>
  </g>

  <!-- Bottom gold rule -->
  <rect x="0" y="296" width="1200" height="2" fill="url(#goldRule)"/>
</svg>
